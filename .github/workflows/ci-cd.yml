name: CI/CD — Monitor Linux

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Testes automatizados ───────────────────────────
  testes:
    name: Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Verificar sintaxe do script Shell
        run: sh -n scripts/monitoramento.sh && echo "✅ Script shell OK"

      - name: Iniciar servidor em background
        run: |
          npm start &
          sleep 3
          echo "Servidor iniciado"

      - name: Rodar testes automatizados
        run: npm test

  # ─── JOB 2: Build da imagem Docker ─────────────────────────
  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Build da imagem Docker
        run: docker build -t monitor-linux:latest .

      - name: Verificar imagem criada
        run: docker images monitor-linux

      - name: Testar container
        run: |
          docker run -d --name monitor-teste -p 3000:3000 monitor-linux:latest
          sleep 5
          curl -f http://localhost:3000/health || exit 1
          echo "✅ Container respondendo corretamente"
          docker stop monitor-teste
          docker rm monitor-teste

  # ─── JOB 3: Validação Kubernetes ────────────────────────────
  kubernetes-validate:
    name: Validar Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3

      - name: Validar manifests YAML do Kubernetes
        run: |
          kubectl apply --dry-run=client -f k8s/deployment.yaml
          kubectl apply --dry-run=client -f k8s/service.yaml
          echo "✅ Manifests Kubernetes válidos"
